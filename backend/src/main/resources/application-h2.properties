# ============================================================
# Perfil H2 — banco em memória para testes sem MySQL
# Uso: mvn spring-boot:run -Dspring-boot.run.profiles=h2
# ============================================================

# H2 In-Memory
spring.datasource.url=jdbc:h2:mem:documentation_center;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.devtools.restart.enabled=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console visual — acesse http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Garante que o data-h2.sql rode DEPOIS do Hibernate criar as tabelas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=classpath:data-h2.sql
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.continue-on-error=true

# IA (ajuste o provider conforme necessário)
ia.provider=gemini
